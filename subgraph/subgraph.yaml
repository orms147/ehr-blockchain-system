specVersion: 1.0.0
description: EHR — on-chain index of records, access requests, consents, doctors
schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum/contract
    name: RecordRegistry
    network: arbitrum-sepolia
    source:
      address: "0x43bf418943442857CA73D15598520592968137da"
      abi: RecordRegistry
      startBlock: 271261349
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/recordRegistry.ts
      entities:
        - Record
        - RecordUpdate
        - Patient
      abis:
        - name: RecordRegistry
          file: ./abis/RecordRegistry.json
      eventHandlers:
        - event: RecordAdded(indexed address,indexed bytes32,bytes32,bytes32,uint40)
          handler: handleRecordAdded
        - event: RecordUpdated(indexed bytes32,indexed bytes32,indexed address)
          handler: handleRecordUpdated

  - kind: ethereum/contract
    name: EHRSystem
    network: arbitrum-sepolia
    source:
      address: "0x262e7aeEe542C6d83c1Bb46fa73e24D910d9F8a3"
      abi: EHRSystem
      startBlock: 271261351
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/ehrSystem.ts
      entities:
        - AccessRequest
        - Patient
      abis:
        - name: EHRSystem
          file: ./abis/EHRSystemSecure.json
      eventHandlers:
        - event: AccessRequested(indexed bytes32,indexed address,indexed address,bytes32,uint8,uint40)
          handler: handleAccessRequested
        - event: RequestCompleted(indexed bytes32,indexed address,indexed address,uint8)
          handler: handleRequestCompleted
        - event: RequestRejected(indexed bytes32,indexed address,uint40)
          handler: handleRequestRejected

  - kind: ethereum/contract
    name: ConsentLedger
    network: arbitrum-sepolia
    source:
      address: "0xa7D9Fe2120613F87922Be76Cee839A382F2c54BA"
      abi: ConsentLedger
      startBlock: 271261347
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/consentLedger.ts
      entities:
        - ConsentEvent
        - DelegationEvent
        - DelegationAccessGrant
        - TrustedContactEvent
      abis:
        - name: ConsentLedger
          file: ./abis/ConsentLedger.json
      eventHandlers:
        - event: ConsentGranted(indexed address,indexed address,indexed bytes32,uint40,bool)
          handler: handleConsentGranted
        - event: ConsentRevoked(indexed address,indexed address,indexed bytes32,uint40)
          handler: handleConsentRevoked
        - event: DelegationGranted(indexed address,indexed address,uint40,bool)
          handler: handleDelegationGranted
        - event: DelegationRevoked(indexed address,indexed address)
          handler: handleDelegationRevoked
        - event: AccessGrantedViaDelegation(indexed address,indexed address,indexed address,bytes32)
          handler: handleAccessGrantedViaDelegation
        - event: TrustedContactSet(indexed address,indexed address,string)
          handler: handleTrustedContactSet
        - event: TrustedContactRevoked(indexed address,indexed address)
          handler: handleTrustedContactRevoked

  - kind: ethereum/contract
    name: AccessControl
    network: arbitrum-sepolia
    source:
      address: "0xA2b937a88c130aD211D12Dc2BC482Cb49CDdD7Cb"
      abi: AccessControl
      startBlock: 271261343
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/accessControl.ts
      entities:
        - Doctor
        - Organization
      abis:
        - name: AccessControl
          file: ./abis/AccessControl.json
      eventHandlers:
        - event: DoctorVerified(indexed address,indexed address,indexed uint256,string)
          handler: handleDoctorVerified
        - event: VerificationRevoked(indexed address,indexed address)
          handler: handleVerificationRevoked
        - event: OrganizationCreated(indexed uint256,string,address,address)
          handler: handleOrganizationCreated
        - event: OrganizationStatusChanged(indexed uint256,bool)
          handler: handleOrganizationStatusChanged
